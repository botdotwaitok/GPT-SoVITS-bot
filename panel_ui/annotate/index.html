<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-SoVITS 音频标注工具</title>
    <link rel="stylesheet" href="/vendor/inter-font/inter.css">
    <link rel="stylesheet" href="/vendor/phosphor-icons/regular/style.css">
    <link rel="stylesheet" href="/vendor/phosphor-icons/fill/style.css">
    <style>
        /* ========== CSS Variables & Reset (aligned with main panel) ========== */
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #222636;
            --bg-card-hover: #2a2f42;
            --bg-card-selected: #1e3a5f;
            --accent: #60a5fa;
            --accent-dim: rgba(96, 165, 250, 0.12);
            --accent-glow: rgba(96, 165, 250, 0.25);
            --accent-danger: #f87171;
            --accent-danger-dim: rgba(248, 113, 113, 0.12);
            --accent-danger-glow: rgba(248, 113, 113, 0.25);
            --accent-success: #4ade80;
            --accent-success-dim: rgba(74, 222, 128, 0.12);
            --accent-warning: #fbbf24;
            --accent-warning-dim: rgba(251, 191, 36, 0.12);
            --text-primary: #e8eaf0;
            --text-secondary: #b4b9cc;
            --text-muted: #8c92b3;
            --border: #2e3348;
            --border-light: #383d56;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ========== Topbar ========== */
        .topbar {
            height: 52px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 101;
            position: sticky;
            top: 0;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .topbar-brand .logo {
            font-size: 22px;
            color: var(--accent);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            text-decoration: none;
        }

        .btn-back:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        /* ========== Header ========== */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 52px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            font-size: 22px;
            color: var(--accent);
        }

        .header-file {
            font-size: 14px;
            color: var(--text-muted);
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .header-stats .stat-value {
            color: var(--accent);
            font-weight: 600;
            font-size: 16px;
        }

        /* ========== Toolbar ========== */
        .toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 120px;
            z-index: 99;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 6px;
        }

        .toolbar label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        /* ========== Buttons ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: var(--accent);
            color: #0f1117;
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: #7bb8fc;
            border-color: #7bb8fc;
        }

        .btn-danger {
            background: var(--accent-danger-dim);
            color: var(--accent-danger);
            border-color: rgba(248, 113, 113, 0.3);
        }

        .btn-danger:hover {
            background: rgba(248, 113, 113, 0.25);
            border-color: var(--accent-danger);
        }

        .btn-success {
            background: var(--accent-success-dim);
            color: var(--accent-success);
            border-color: rgba(74, 222, 128, 0.3);
        }

        .btn-success:hover {
            background: rgba(74, 222, 128, 0.25);
            border-color: var(--accent-success);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ========== Duration Filter ========== */
        .filter-panel {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-panel label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .filter-panel label i {
            font-size: 18px;
            color: var(--accent);
        }

        .range-slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-slider-group input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 160px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .range-slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .range-value {
            background: var(--bg-card);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            min-width: 50px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .filter-info {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: auto;
        }

        .filter-info strong {
            color: var(--accent);
        }

        /* ========== Main Content ========== */
        .main {
            padding: 20px 28px;
            padding-bottom: 80px;
        }

        /* ========== Audio Entry Row ========== */
        .entry-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            margin-bottom: 6px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            transition: var(--transition);
            cursor: pointer;
        }

        .entry-row:hover {
            background: var(--bg-card-hover);
            border-color: rgba(96, 165, 250, 0.3);
        }

        .entry-row.selected {
            background: var(--bg-card-selected);
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent-glow);
        }

        .entry-row.playing {
            border-color: var(--accent-success);
            box-shadow: 0 0 12px rgba(74, 222, 128, 0.15);
        }

        /* Big checkbox */
        .entry-check {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            appearance: none;
            -webkit-appearance: none;
            background: var(--bg-primary);
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: var(--transition);
        }

        .entry-check:hover {
            border-color: var(--accent);
        }

        .entry-check:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .entry-check:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f1117;
            font-size: 16px;
            font-weight: 700;
        }

        /* Entry index */
        .entry-index {
            flex-shrink: 0;
            width: 44px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            text-align: center;
        }

        /* Play button */
        .entry-play {
            flex-shrink: 0;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 18px;
        }

        .entry-play:hover {
            background: var(--accent-glow);
            transform: scale(1.1);
        }

        .entry-play.playing-btn {
            border-color: var(--accent-success);
            color: var(--accent-success);
            background: var(--accent-success-dim);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.3);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(74, 222, 128, 0);
            }
        }

        /* Duration badge */
        .entry-duration {
            flex-shrink: 0;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        .duration-short {
            background: var(--accent-danger-dim);
            color: var(--accent-danger);
        }

        .duration-ok {
            background: var(--accent-success-dim);
            color: var(--accent-success);
        }

        .duration-long {
            background: var(--accent-warning-dim);
            color: var(--accent-warning);
        }

        /* Entry text (editable) */
        .entry-text {
            flex: 1;
            min-width: 0;
            font-size: 15px;
            color: var(--text-primary);
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            padding: 6px 10px;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        .entry-text:hover {
            border-color: var(--border);
        }

        .entry-text:focus {
            border-color: var(--accent);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* Entry info */
        .entry-info {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            min-width: 120px;
        }

        .entry-speaker {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .entry-lang {
            font-size: 12px;
            color: var(--text-muted);
            padding: 2px 8px;
            background: var(--accent-dim);
            border-radius: 10px;
        }

        .entry-filename {
            font-size: 12px;
            color: var(--text-muted);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ========== Loading / Empty ========== */
        .loading-container,
        .empty-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-icon {
            font-size: 52px;
            color: var(--text-muted);
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .error-icon {
            font-size: 48px;
            color: var(--accent-danger);
            margin-bottom: 12px;
        }

        /* ========== Toast notification ========== */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast-success {
            border-color: var(--accent-success);
        }

        .toast-error {
            border-color: var(--accent-danger);
        }

        .toast-info {
            border-color: var(--accent);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ========== Keyboard shortcut hint ========== */
        .shortcuts-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 8px 28px;
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-muted);
            z-index: 100;
        }

        .shortcut-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 20px;
            padding: 0 5px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-right: 4px;
        }

        /* ========== Ref Audio Tag ========== */
        .entry-ref-btn {
            flex-shrink: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 18px;
        }

        .entry-ref-btn:hover {
            border-color: #fbbf24;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.08);
        }

        .entry-ref-btn.tagged {
            border-color: #fbbf24;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.15);
        }

        .entry-row.ref-tagged {
            border: 1px solid rgba(251, 191, 36, 0.3);
            background: rgba(251, 191, 36, 0.04);
        }

        .entry-row.ref-tagged:hover {
            background: rgba(251, 191, 36, 0.08);
        }

        .ref-emotion-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            white-space: nowrap;
        }

        /* Emotion picker dropdown */
        .ref-emotion-picker {
            position: absolute;
            z-index: 200;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            min-width: 380px;
        }

        .ref-emotion-picker button {
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            font-family: inherit;
        }

        .ref-emotion-picker button:hover {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        .ref-emotion-picker .custom-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 6px;
        }

        .ref-emotion-picker .custom-row input {
            flex: 1;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        .ref-emotion-picker .custom-row input:focus {
            border-color: #fbbf24;
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
            border-radius: 3px;
        }

        /* ========== Quality Analysis ========== */
        .quality-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .quality-badge.qb-clipping {
            background: var(--accent-danger-dim);
            color: var(--accent-danger);
        }

        .quality-badge.qb-loud {
            background: rgba(251, 146, 60, 0.15);
            color: #fb923c;
        }

        .quality-badge.qb-silent {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
        }

        .quality-badge.qb-muffled {
            background: rgba(167, 139, 250, 0.15);
            color: #a78bfa;
        }

        .quality-badge.qb-noisy {
            background: var(--accent-warning-dim);
            color: var(--accent-warning);
        }

        .quality-badge.qb-spike {
            background: rgba(244, 114, 182, 0.15);
            color: #f472b6;
        }

        .quality-badge.qb-dc_offset {
            background: rgba(45, 212, 191, 0.15);
            color: #2dd4bf;
        }

        .quality-badge.qb-read_error,
        .quality-badge.qb-analyze_error {
            background: var(--accent-danger-dim);
            color: var(--accent-danger);
        }

        .quality-filter-panel {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 14px 28px;
            display: none;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quality-filter-panel.visible {
            display: flex;
        }

        .quality-filter-panel label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .quality-filter-panel label i {
            font-size: 18px;
            color: var(--accent-warning);
        }

        .quality-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: inherit;
        }

        .quality-chip:hover {
            border-color: var(--accent-warning);
            background: var(--bg-card-hover);
        }

        .quality-chip.active {
            border-color: var(--accent-warning);
            background: rgba(251, 191, 36, 0.12);
            color: var(--accent-warning);
        }

        .quality-chip .chip-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
        }

        .quality-chip.active .chip-count {
            background: rgba(251, 191, 36, 0.2);
        }

        .quality-chip-clear {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            font-family: inherit;
        }

        .quality-chip-clear:hover {
            background: var(--accent-glow);
        }

        .analysis-progress {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .analysis-progress.visible {
            display: flex;
        }

        .progress-bar-wrap {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-success));
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .entry-badges {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            flex-wrap: wrap;
            max-width: 200px;
        }

        /* ========== Toggle Switch ========== */
        .toggle-switch {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            user-select: none;
        }

        .toggle-switch input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: relative;
            width: 40px;
            height: 22px;
            background: var(--border);
            border-radius: 11px;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            background: var(--text-muted);
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle-switch input:checked+.toggle-slider {
            background: var(--accent);
        }

        .toggle-switch input:checked+.toggle-slider::after {
            transform: translateX(18px);
            background: #fff;
        }

        .toggle-switch:hover .toggle-slider {
            background: var(--border-light);
        }

        .toggle-switch:hover input:checked+.toggle-slider {
            background: #7bb8fc;
        }

        /* ========== Toolbar Tooltips ========== */
        .toolbar-tip-wrap {
            position: relative;
        }

        .toolbar-tip {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            padding: 10px 14px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
            animation: fadeIn 0.15s ease;
        }

        .toolbar-tip::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 8px;
            height: 8px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            border-left: 1px solid var(--border);
        }

        .toolbar-tip-wrap:hover .toolbar-tip {
            display: block;
        }

        .toolbar-tip strong {
            color: var(--accent);
            font-weight: 600;
        }

        /* ========== Concat Modal ========== */
        .concat-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .concat-modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 640px;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            animation: modalSlideIn 0.25s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .concat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
        }

        .concat-header h2 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .concat-header h2 i {
            color: var(--accent);
            font-size: 22px;
        }

        .concat-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: 18px;
        }

        .concat-close:hover {
            border-color: var(--accent-danger);
            color: var(--accent-danger);
            background: var(--accent-danger-dim);
        }

        .concat-body {
            padding: 20px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .concat-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .concat-empty i {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.5;
        }

        .concat-group {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .concat-group:hover {
            border-color: rgba(96, 165, 250, 0.3);
        }

        .concat-group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .concat-group-title {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .concat-group-title .emotion-tag {
            padding: 3px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .concat-group-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .concat-group-meta strong {
            color: var(--accent);
        }

        .concat-slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .concat-slider-row label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
        }

        .concat-slider-row input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .concat-slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .concat-slider-val {
            background: var(--bg-primary);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            min-width: 50px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .concat-clips-list {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            max-height: 100px;
            overflow-y: auto;
        }

        .concat-clip-item {
            padding: 3px 0;
            display: flex;
            gap: 8px;
        }

        .concat-clip-dur {
            color: var(--accent);
            font-weight: 600;
            min-width: 45px;
        }

        .concat-actions {
            display: flex;
            gap: 8px;
        }

        .concat-result {
            margin-top: 12px;
            padding: 12px 16px;
            background: var(--accent-success-dim);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--accent-success);
            font-weight: 500;
        }

        .concat-result .result-info {
            flex: 1;
        }
    </style>
</head>

<body>
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-brand">
            <i class="ph ph-pencil-simple-line logo"></i>
            <span>音频标注工具</span>
        </div>
        <div class="topbar-right">
            <a class="btn-back" href="/" title="返回训练面板">
                <i class="ph ph-arrow-left"></i>
                返回训练面板
            </a>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1><i class="ph ph-microphone-stage"></i> GPT-SoVITS 音频标注</h1>
            <div class="header-file" id="headerFile">加载中...</div>
        </div>
        <div class="header-stats">
            <div>总条目 <span class="stat-value" id="statTotal">-</span></div>
            <div>已筛选 <span class="stat-value" id="statFiltered">-</span></div>
            <div>已选中 <span class="stat-value" id="statSelected">0</span></div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <button class="btn" id="btnSelectAll" onclick="selectAll()"><i class="ph ph-check-square"></i> 全选</button>
            <button class="btn" id="btnDeselectAll" onclick="deselectAll()"><i class="ph ph-square"></i> 取消全选</button>
            <button class="btn" id="btnInvert" onclick="invertSelection()"><i class="ph ph-arrows-left-right"></i>
                反选</button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="btn btn-danger" id="btnDelete" onclick="deleteSelected()" disabled><i
                    class="ph ph-trash"></i> 批量删除 (0)</button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="btn btn-success" id="btnUndo" onclick="undoAction()"><i
                    class="ph ph-arrow-counter-clockwise"></i> 撤销</button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="btn" id="btnSelectShort" onclick="selectByDuration('short')">选中过短</button>
            <button class="btn" id="btnSelectLong" onclick="selectByDuration('long')">选中过长</button>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <div class="toolbar-tip-wrap">
                <button class="btn" id="btnAnalyze" onclick="startAnalysis()"><i class="ph ph-shield-check"></i>
                    智能质检</button>
                <div class="toolbar-tip">
                    <i class="ph ph-info" style="color: var(--accent); margin-right: 4px;"></i>
                    自动检测音频中的<strong>爆音、杂音、音量异常</strong>等问题，帮你快速定位低质量片段
                </div>
            </div>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <div class="toolbar-tip-wrap">
                <button class="btn" id="btnConcat" onclick="openConcatModal()"><i class="ph ph-link-simple"></i>
                    拼接参考音频</button>
                <div class="toolbar-tip">
                    <i class="ph ph-info" style="color: var(--accent); margin-right: 4px;"></i>
                    将多条<strong>短音频拼接成 3~10 秒</strong>的参考音频，供推理时使用。仅有一条时，将自动复制延长该音频。
                </div>
            </div>
            <div class="toolbar-tip-wrap">
                <button class="btn" id="btnExtractRef" onclick="openExtractModal()">
                    <i class="ph ph-export"></i> 提取参考音频
                </button>
                <div class="toolbar-tip">
                    <i class="ph ph-info" style="color: var(--accent); margin-right: 4px;"></i>
                    将已标记的音频复制到 <strong>ref_audio/</strong> 文件夹，供推理和部署使用
                </div>
            </div>
        </div>
    </div>

    <!-- Duration Filter -->
    <div class="filter-panel">
        <label><i class="ph ph-timer"></i> 时长筛选:</label>
        <div class="range-slider-group">
            <label>最小</label>
            <input type="range" id="filterMin" min="0" max="60" step="0.5" value="0" oninput="onFilterChange()">
            <span class="range-value" id="filterMinVal">0s</span>
        </div>
        <div class="range-slider-group">
            <label>最大</label>
            <input type="range" id="filterMax" min="0" max="60" step="0.5" value="60" oninput="onFilterChange()">
            <span class="range-value" id="filterMaxVal">60s</span>
        </div>
        <div class="toolbar-divider"></div>
        <div class="toolbar-group">
            <button class="btn" onclick="setQuickFilter(0, 1)">&lt; 1s</button>
            <button class="btn" onclick="setQuickFilter(0, 2)">&lt; 2s</button>
            <button class="btn" onclick="setQuickFilter(2, 10)">2-10s</button>
            <button class="btn" onclick="setQuickFilter(10, 60)"> &gt; 10s</button>
            <button class="btn btn-primary" onclick="setQuickFilter(0, 999)">显示全部</button>
        </div>
        <div class="filter-info">
            显示 <strong id="filterCount">-</strong> / <strong id="filterTotal">-</strong> 条
        </div>
    </div>

    <!-- Analysis Progress Bar -->
    <div class="analysis-progress" id="analysisProgress">
        <i class="ph ph-spinner"
            style="font-size: 18px; color: var(--accent); animation: spin 0.8s linear infinite;"></i>
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="analysisProgressFill"></div>
        </div>
        <span class="progress-text" id="analysisProgressText">分析中... 0%</span>
    </div>

    <!-- Quality Filter Panel -->
    <div class="quality-filter-panel" id="qualityFilterPanel">
        <label><i class="ph ph-shield-warning"></i> 质检筛选:</label>
        <div id="qualityChips"></div>
    </div>

    <!-- Main List -->
    <div class="main" id="mainList">
        <div class="loading-container" id="loadingState">
            <div class="loading-spinner"></div>
            <div>正在加载音频数据...</div>
        </div>
    </div>

    <!-- Concat Modal (hidden by default) -->
    <div class="concat-overlay" id="concatOverlay" style="display:none"></div>
    <div class="concat-overlay" id="extractOverlay" style="display:none"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Keyboard Shortcuts Bar -->
    <div class="shortcuts-bar">
        <div><span class="shortcut-key">Space</span> 播放/暂停</div>
        <div><span class="shortcut-key">Del</span> 删除选中</div>
        <div><span class="shortcut-key">Ctrl+A</span> 全选</div>
        <div><span class="shortcut-key">Ctrl+Z</span> 撤销</div>
        <div><span class="shortcut-key">↑↓</span> 导航</div>
        <div><span class="shortcut-key">Shift+点击</span> 范围选择</div>
        <div><span class="shortcut-key">R</span> 标记参考音频</div>
    </div>

    <!-- Hidden audio element -->
    <audio id="audioPlayer" preload="none"></audio>

    <script>
        // ============== State ==============
        let allEntries = [];
        let filteredEntries = [];
        let selectedIds = new Set();
        let currentPlayingId = null;
        let lastClickedIndex = -1;     // for shift-click range select
        let focusedIndex = -1;         // for keyboard navigation
        let refTags = {};              // id -> {emotion, wav_path, ...}
        let analysisResults = {};      // id_str -> [issue tags]
        let analysisSummary = {};      // tag -> count
        let activeQualityFilter = null; // currently active quality filter tag
        const audioPlayer = document.getElementById('audioPlayer');

        // ============== API ==============
        async function apiGet(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        }
        async function apiPost(url, body) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        }

        // ============== Init ==============
        async function init() {
            const loadingEl = document.getElementById('loadingState');
            try {
                const data = await apiGet('/api/annotate/entries');
                allEntries = data.entries || [];
                document.getElementById('headerFile').textContent = data.file || '未知文件';
                document.getElementById('statTotal').textContent = data.total || 0;

                // Set slider max based on actual data
                if (allEntries.length > 0) {
                    const maxDur = Math.ceil(Math.max(...allEntries.map(e => e.duration)));
                    const sliderMax = Math.min(Math.max(maxDur + 5, 30), 300);
                    document.getElementById('filterMax').max = sliderMax;
                    document.getElementById('filterMax').value = sliderMax;
                    document.getElementById('filterMaxVal').textContent = sliderMax + 's';
                    document.getElementById('filterMin').max = sliderMax;
                }

                // Remove loading state BEFORE renderList overwrites mainList innerHTML
                if (loadingEl) loadingEl.remove();
                await loadRefTags();
                applyFilter();
            } catch (err) {
                if (loadingEl) {
                    loadingEl.innerHTML = `
                    <div class="error-icon"><i class="ph ph-x-circle"></i></div>
                    <div style="font-size: 16px; color: var(--accent-danger);">加载失败</div>
                    <div style="margin-top: 8px; color: var(--text-muted);">${err.message}</div>
                `;
                }
            }
        }

        // ============== Filter ==============
        function onFilterChange() {
            const min = parseFloat(document.getElementById('filterMin').value);
            const max = parseFloat(document.getElementById('filterMax').value);
            document.getElementById('filterMinVal').textContent = min + 's';
            document.getElementById('filterMaxVal').textContent = max + 's';
            applyFilter();
        }

        function setQuickFilter(min, max) {
            const sliderMax = parseFloat(document.getElementById('filterMax').max);
            document.getElementById('filterMin').value = min;
            document.getElementById('filterMax').value = Math.min(max, sliderMax);
            document.getElementById('filterMinVal').textContent = min + 's';
            document.getElementById('filterMaxVal').textContent = (max >= 999 ? sliderMax : max) + 's';
            applyFilter();
        }

        function applyFilter() {
            const min = parseFloat(document.getElementById('filterMin').value);
            const max = parseFloat(document.getElementById('filterMax').value);

            filteredEntries = allEntries.filter(e => e.duration >= min && e.duration <= max);

            // Apply quality filter if active
            if (activeQualityFilter) {
                filteredEntries = filteredEntries.filter(e => {
                    const issues = analysisResults[String(e.id)];
                    return issues && issues.includes(activeQualityFilter);
                });
            }

            document.getElementById('statFiltered').textContent = filteredEntries.length;
            document.getElementById('filterCount').textContent = filteredEntries.length;
            document.getElementById('filterTotal').textContent = allEntries.length;

            renderList();
            updateSelectionUI();
        }

        // ============== Render List ==============
        function renderList() {
            const container = document.getElementById('mainList');

            if (filteredEntries.length === 0) {
                container.innerHTML = `
                <div class="empty-container">
                    <div class="empty-icon"><i class="ph ph-tray"></i></div>
                    <div style="font-size: 16px;">没有匹配的音频条目</div>
                    <div style="margin-top: 8px; font-size: 14px; color: var(--text-muted);">尝试调整筛选条件</div>
                </div>
            `;
                return;
            }

            // Render rows
            const html = filteredEntries.map((entry, visualIdx) => {
                const isSelected = selectedIds.has(entry.id);
                const isPlaying = currentPlayingId === entry.id;
                const durClass = entry.duration < 1 ? 'duration-short'
                    : entry.duration > 15 ? 'duration-long'
                        : 'duration-ok';
                const filename = entry.wav_path.split(/[/\\]/).pop();

                return `
                <div class="entry-row ${isSelected ? 'selected' : ''} ${isPlaying ? 'playing' : ''} ${refTags[entry.id] ? 'ref-tagged' : ''}" 
                     data-id="${entry.id}" data-vidx="${visualIdx}"
                     onclick="onRowClick(event, ${entry.id}, ${visualIdx})">
                    <input type="checkbox" class="entry-check" 
                           ${isSelected ? 'checked' : ''} 
                           data-id="${entry.id}"
                           onclick="event.stopPropagation(); toggleSelect(${entry.id}, ${visualIdx}, event)">
                    <div class="entry-index">#${entry.id}</div>
                    <button class="entry-play ${isPlaying ? 'playing-btn' : ''}" 
                            onclick="event.stopPropagation(); togglePlay(${entry.id})"
                            title="播放">
                        <i class="${isPlaying ? 'ph-fill ph-pause' : 'ph-fill ph-play'}"></i>
                    </button>
                    <span class="entry-duration ${durClass}">${entry.duration}s</span>
                    <input type="text" class="entry-text" value="${escapeHtml(entry.text)}"
                           data-id="${entry.id}"
                           onclick="event.stopPropagation()"
                           onblur="onTextEdit(${entry.id}, this.value)"
                           onkeydown="if(event.key==='Enter'){this.blur();}">
                    <button class="entry-ref-btn ${refTags[entry.id] ? 'tagged' : ''}" 
                            onclick="event.stopPropagation(); toggleRefTag(${entry.id}, this)"
                            title="${refTags[entry.id] ? '取消参考音频' : '标记为参考音频'}">
                        <i class="${refTags[entry.id] ? 'ph-fill ph-star' : 'ph ph-star'}"></i>
                    </button>
                    ${refTags[entry.id] ? `<span class="ref-emotion-badge">${escapeHtml(refTags[entry.id].emotion)}</span>` : ''}
                    ${renderQualityBadges(entry.id)}
                    <div class="entry-info">
                        <span class="entry-speaker">${escapeHtml(entry.speaker_name)}</span>
                        <span class="entry-lang">${escapeHtml(entry.language)}</span>
                        <span class="entry-filename" title="${escapeHtml(filename)}">${escapeHtml(filename)}</span>
                    </div>
                </div>
            `;
            }).join('');

            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============== Selection ==============
        function onRowClick(event, id, visualIdx) {
            if (event.target.tagName === 'INPUT') return;  // checkbox or text field handled separately
            toggleSelect(id, visualIdx, event);
        }

        function toggleSelect(id, visualIdx, event) {
            if (event && event.shiftKey && lastClickedIndex >= 0) {
                // Range select
                const start = Math.min(lastClickedIndex, visualIdx);
                const end = Math.max(lastClickedIndex, visualIdx);
                for (let i = start; i <= end; i++) {
                    selectedIds.add(filteredEntries[i].id);
                }
            } else {
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                } else {
                    selectedIds.add(id);
                }
            }
            lastClickedIndex = visualIdx;
            focusedIndex = visualIdx;
            renderList();
            updateSelectionUI();
        }

        function selectAll() {
            filteredEntries.forEach(e => selectedIds.add(e.id));
            renderList();
            updateSelectionUI();
        }

        function deselectAll() {
            selectedIds.clear();
            renderList();
            updateSelectionUI();
        }

        function invertSelection() {
            filteredEntries.forEach(e => {
                if (selectedIds.has(e.id)) {
                    selectedIds.delete(e.id);
                } else {
                    selectedIds.add(e.id);
                }
            });
            renderList();
            updateSelectionUI();
        }

        function selectByDuration(type) {
            const min = parseFloat(document.getElementById('filterMin').value);
            const max = parseFloat(document.getElementById('filterMax').value);

            if (currentPlayingId === id) {
                // Pause

                currentPlayingId = null;
                renderList();
                return;
            }

            const entry = allEntries.find(e => e.id === id);
            if (!entry) return;

            currentPlayingId = id;
            audioPlayer.src = `/api/annotate/audio?path=${encodeURIComponent(entry.wav_path)}`;
            audioPlayer.play().catch(err => {
                showToast('播放失败: ' + err.message, 'error');

                renderList();
            });
            renderList();

            try {

                if (e.key === 'Enter' && customInput.value.trim()) {
                    setRefEmotion(id, customInput.value.trim());
                    picker.remove();

                if (e.key === 'Escape') picker.remove();
            };

                    picker.remove();

            customRow.appendChild(customInput);

            const rect = btnEl.getBoundingClientRect();

        // ============== Keyboard Shortcuts ==============
        document.addEventListener('keydown', (e) => {
            // Skip if typing in text field
            if (e.target.tagName === 'INPUT' && e.target.type === 'text') return;

            if (e.key === ' ') {
                e.preventDefault();
                if (focusedIndex >= 0 && focusedIndex < filteredEntries.length) {
                    togglePlay(filteredEntries[focusedIndex].id);
                }
            }
            if (e.key === 'Delete') {
                e.preventDefault();
                deleteSelected();
            }
            if (e.key === 'a' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                selectAll();
            }
            if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                undoAction();
            }
            if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                if (focusedIndex >= 0 && focusedIndex < filteredEntries.length) {
                    const entryId = filteredEntries[focusedIndex].id;
                    const btn = document.querySelector(`.entry-ref-btn[onclick*="${entryId}"]`);
                    toggleRefTag(entryId, btn);
                }
            }
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (focusedIndex < filteredEntries.length - 1) {
                    focusedIndex++;
                    scrollToEntry(focusedIndex);
                    // If nothing selected, auto-highlight
                    if (selectedIds.size === 0) {
                        selectedIds.add(filteredEntries[focusedIndex].id);
                        renderList();
                        updateSelectionUI();
                    }
                }
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (focusedIndex > 0) {
                    focusedIndex--;
                    scrollToEntry(focusedIndex);
                }
            }
        });

        let analysisPollTimer = null;

        async function startAnalysis() {
            const btn = document.getElementById('btnAnalyze');
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner" style="animation: spin 0.8s linear infinite;"></i> 分析中...';

            try {
                await apiPost('/api/annotate/analyze', {});
                showToast('质检分析已启动', 'info');
                document.getElementById('analysisProgress').classList.add('visible');
                pollAnalysisStatus();
            } catch (err) {
                showToast('启动分析失败: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '智能质检';
            }
        }

        function pollAnalysisStatus() {
            if (analysisPollTimer) clearInterval(analysisPollTimer);
            analysisPollTimer = setInterval(async () => {
                try {
                    const data = await apiGet('/api/annotate/analyze/status');
                    const fill = document.getElementById('analysisProgressFill');
                    const text = document.getElementById('analysisProgressText');
                    fill.style.width = data.progress + '%';
                    text.textContent = `分析中... ${data.processed}/${data.total} (${data.progress}%)`;

                    if (data.status === 'done') {
                        clearInterval(analysisPollTimer);
                        analysisPollTimer = null;
                        analysisResults = data.results || {};
                        analysisSummary = data.summary || {};
                        document.getElementById('analysisProgress').classList.remove('visible');

                        const btn = document.getElementById('btnAnalyze');
                        btn.disabled = false;
                        btn.innerHTML = '智能质检';

                        const issueCount = Object.keys(analysisResults).length;
                        if (issueCount > 0) {
                            showToast(`质检完成：发现 ${issueCount} 条疑似问题音频`, 'info');
                        } else {
                            showToast('质检完成：所有音频质量良好', 'success');
                        }

                        renderQualityChips();
                        renderList();
                    } else if (data.status === 'error') {
                        clearInterval(analysisPollTimer);
                        analysisPollTimer = null;
                        document.getElementById('analysisProgress').classList.remove('visible');
                        const btn = document.getElementById('btnAnalyze');
                        btn.disabled = false;
                        btn.innerHTML = '智能质检';
                        showToast('分析出错: ' + (data.error || '未知错误'), 'error');
                    }
                } catch (err) {
                    // Silently continue polling
                }
            }, 800);
        }

        async function doConcatRef(emotion) {
            const slider = document.getElementById('concatSlider_' + emotion);
            const targetDuration = slider ? parseFloat(slider.value) : 5.0;
            const resultEl = document.getElementById('concatResult_' + emotion);

            // Find the concat button and disable it
            const group = document.getElementById('concatGroup_' + emotion);
            const btn = group ? group.querySelector('.btn-primary') : null;
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="ph ph-spinner" style="animation: spin 0.8s linear infinite;"></i> 拼接中...';
            }

            try {
                const data = await apiPost('/api/annotate/concat_ref', {
                    emotion: emotion,
                    target_duration: targetDuration,
                });

                if (resultEl) {
                    resultEl.innerHTML = `
                        <div class="concat-result">
                            <button class="entry-play" onclick="event.stopPropagation(); playConcatResult(this, '${escapeHtml(data.path)}')" title="试听">

                            </div>
                        </div>`;

                if (resultEl) {
                    // Add remove-source checkbox after result
                    const removeDiv = document.createElement('div');
                    removeDiv.style.cssText = 'margin-top:10px; display:flex; align-items:center; gap:10px; font-size:13px;';
                    removeDiv.innerHTML = `
                        <label class="toggle-switch">
                            <input type="checkbox" id="concatRemove_${escapeHtml(emotion)}">

                        </label>

                    `;
                    resultEl.appendChild(removeDiv);
                }

                showToast('拼接成功！已保存到 ref_audio/ 目录', 'success');

                showToast('拼接失败: ' + err.message, 'error');

        function playConcatResult(btnEl, path) {
            const icon = btnEl.querySelector('i');
            if (audioPlayer.src && audioPlayer.src.includes(encodeURIComponent(path)) && !audioPlayer.paused) {
                audioPlayer.pause();
                icon.className = 'ph-fill ph-play';
                btnEl.classList.remove('playing-btn');
                return;
            }
            // Stop any other playing
            currentPlayingId = null;
            audioPlayer.src = '/api/annotate/audio?path=' + encodeURIComponent(path);
            audioPlayer.play().catch(err => showToast('播放失败: ' + err.message, 'error'));
            icon.className = 'ph-fill ph-pause';
            btnEl.classList.add('playing-btn');

            audioPlayer.onended = () => {
                icon.className = 'ph-fill ph-play';
                btnEl.classList.remove('playing-btn');
            };
        }

        function closeConcatModal() {
            const overlay = document.getElementById('concatOverlay');
            overlay.style.display = 'none';
            overlay.innerHTML = '';

        async function removeConcatSources(emotion) {
            const cb = document.getElementById('concatRemove_' + emotion);
            if (!cb || !cb.checked) {
                showToast('请先勾选确认框', 'error');
                return;
            }
            try {
                const preview = concatPreviewData[emotion];
                if (!preview || !preview.clips) return;
                const ids = preview.clips.map(c => c.id).filter(id => id !== undefined);
                if (ids.length === 0) {
                    showToast('没有找到可移除的条目', 'error');
                    return;
                }
                await apiPost('/api/annotate/delete', { ids });
                showToast(`已从训练集移除 ${ids.length} 条原始片段`, 'success');
                await loadAnnotateData();
            } catch (err) {
                showToast('移除失败: ' + err.message, 'error');
            }
        }

                <div class="concat-modal">
                    <div class="concat-header">
                        <h2><i class="ph ph-export"></i> 提取参考音频</h2>
                        <button class="concat-close" onclick="closeExtractModal()"><i class="ph ph-x"></i></button>
                    </div>
                    <div class="concat-body">
                        <div style="text-align:center; padding:40px;"><div class="loading-spinner"></div><div>加载中...</div></div>
                    </div>
                </div>`;

            try {
                const data = await apiGet('/api/annotate/ref_tags');
                const tags = data.tags || {};
                const tagEntries = Object.entries(tags);

                if (tagEntries.length === 0) {
                    overlay.innerHTML = `
                        <div class="concat-modal">
                            <div class="concat-header">
                                <h2><i class="ph ph-export"></i> 提取参考音频</h2>
                                <button class="concat-close" onclick="closeExtractModal()"><i class="ph ph-x"></i></button>
                            </div>
                            <div class="concat-body">
                                <div class="concat-empty">
                                    <i class="ph ph-tag"></i>
                                    <div style="font-size:16px; margin-bottom:8px;">没有已标记的参考音频</div>
                                    <div style="font-size:14px;">请先在标注列表中标记音频为参考音频（点击星标按钮）</div>
                                </div>
                            </div>
                        </div>`;
                    return;
                }

                // Group by emotion
                const groups = {};
                for (const [id, info] of tagEntries) {
                    const em = info.emotion || 'default';
                    if (!groups[em]) groups[em] = [];
                    groups[em].push({ id, text: info.text || '', duration: info.duration || 0 });
                }

                let groupsHtml = '';
                for (const [em, clips] of Object.entries(groups)) {
                    const clipsHtml = clips.map(c =>
                        `<div class="concat-clip-item">
                            <span class="concat-clip-dur">${c.duration}s</span>
                            <span>${escapeHtml(c.text || '(无文本)')}</span>
                        </div>`
                    ).join('');

                    groupsHtml += `
                        <div class="concat-group">
                            <div class="concat-group-header">
                                <div class="concat-group-title">
                                    <span class="emotion-tag">${escapeHtml(em)}</span>
                                </div>
                                <div class="concat-group-meta">
                                    <span>片段: <strong>${clips.length}</strong></span>
                                </div>
                            </div>
                            <div class="concat-clips-list">${clipsHtml}</div>
                        </div>`;
                }

                overlay.innerHTML = `
                    <div class="concat-modal">
                        <div class="concat-header">
                            <h2><i class="ph ph-export"></i> 提取参考音频</h2>
                            <button class="concat-close" onclick="closeExtractModal()"><i class="ph ph-x"></i></button>
                        </div>
                        <div class="concat-body">
                            <div style="padding:12px 16px; font-size:14px; opacity:0.85;">
                                将以下 <strong>${tagEntries.length}</strong> 条已标记音频复制到 <code style="background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:4px;">ref_audio/</code> 目录
                            </div>
                            ${groupsHtml}
                            <div style="padding:16px; display:flex; flex-direction:column; gap:12px;">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="extractRemoveTraining">
                                    <span class="toggle-slider"></span>
                                    提取后从训练集移除这些条目
                                </label>
                                <button class="btn btn-primary" id="btnDoExtract" onclick="doExtractRef()">
                                    <i class="ph ph-export"></i> 确认提取 (${tagEntries.length} 条)
                                </button>
                            </div>
                        </div>
                    </div>`;

            } catch (err) {
                overlay.innerHTML = `
                    <div class="concat-modal">
                        <div class="concat-header">
                            <h2>提取参考音频</h2>
                            <button class="concat-close" onclick="closeExtractModal()"><i class="ph ph-x"></i></button>
                        </div>
                        <div class="concat-body">
                            <div class="concat-empty"><i class="ph ph-warning-circle"></i><div>加载失败: ${escapeHtml(err.message)}</div></div>
                        </div>
                    </div>`;
            }
        }

        function closeExtractModal() {
            const overlay = document.getElementById('extractOverlay');
            overlay.style.display = 'none';
            overlay.innerHTML = '';
        }

        async function doExtractRef() {
            const btn = document.getElementById('btnDoExtract');
            const removeCheckbox = document.getElementById('extractRemoveTraining');
            const removeFromTraining = removeCheckbox ? removeCheckbox.checked : false;

            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="ph ph-spinner" style="animation: spin 0.8s linear infinite;"></i> 提取中...';
            }

            try {
                const data = await apiPost('/api/annotate/extract_ref', {
                    remove_from_training: removeFromTraining
                });

                let msg = `成功提取 ${data.extracted} 条到 ref_audio/`;
                if (data.removed_from_training > 0) {
                    msg += `，已从训练集移除 ${data.removed_from_training} 条`;
                }
                if (data.errors && data.errors.length > 0) {
                    msg += `\n⚠️ ${data.errors.length} 个错误`;
                }
                showToast(msg, 'success');
                closeExtractModal();

                if (data.removed_from_training > 0) {
                    await loadAnnotateData();
                }
            } catch (err) {
                showToast('提取失败: ' + err.message, 'error');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="ph ph-export"></i> 确认提取';
                }
            }
        }

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const concatOv = document.getElementById('concatOverlay');
                if (concatOv && concatOv.style.display !== 'none') {
                    closeConcatModal();
                    return;
                }
                const extractOv = document.getElementById('extractOverlay');
                if (extractOv && extractOv.style.display !== 'none') {
                    closeExtractModal();
                    return;
                }
            }
        });

        // ============== Start ==============
        init();
    </script>
</body>

</html>
